name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'lambdas/**'
  workflow_dispatch:

env:
  AWS_REGION: us-west-2

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./terraform
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: lambdas/package-lock.json

      - name: Install dependencies and run Lambda tests
        working-directory: ./lambdas
        run: |
          npm ci
          npm test

      - name: Package Lambda Functions
        run: |
          # Create zip directory if it doesn't exist
          mkdir -p zip
          
          # Package all lambda functions
          for lambda_dir in ../lambdas/*/; do
            if [ -d "$lambda_dir" ]; then
              lambda_name=$(basename "$lambda_dir")
              echo "Packaging lambda: $lambda_name"
              
              cd "$lambda_dir"
              
              # Install dependencies if package.json exists
              if [ -f "package.json" ]; then
                npm install --production
              fi
              
              # Create zip file
              zip -r "../../terraform/zip/${lambda_name}.zip" .
              
              cd - > /dev/null
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set -eo pipefail
          terraform version
          # Full log to file so the job log can be truncated without losing the error.
          terraform plan -var-file variables/terraform.tfvars -no-color -compact-warnings \
            2>&1 | tee plan-full.log

      - name: Terraform plan — tail log on failure
        if: failure() && steps.plan.outcome == 'failure'
        run: |
          echo "========== last 200 lines of plan-full.log =========="
          tail -n 200 plan-full.log || true
          echo "========== (download artifact terraform-plan-log for full output) =========="

      - name: Upload Terraform plan log
        if: failure() && steps.plan.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-log
          path: terraform/plan-full.log

      - name: Terraform Apply
        id: apply
        run: terraform apply -var-file variables/terraform.tfvars -auto-approve
