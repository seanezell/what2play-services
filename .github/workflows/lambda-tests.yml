name: Lambda tests

on:
  pull_request:
    paths:
      - 'lambdas/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lambdas

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: lambdas/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test
